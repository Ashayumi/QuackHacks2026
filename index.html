<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dead on Arrival — A Murder Mystery Detective Game</title>
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

<div class="doa-root">
  <div class="scanlines"></div>

  <div class="top-bar">
    <div class="rec-pill">
      <span class="rec-dot"></span>
      <span class="rec-label">PLAYBACK MODE</span>
    </div>
    <div class="case-label">EVIDENCE ARCHIVE — CASE #0001</div>
    <div class="date-label" id="game-date">OCT 14, 19██</div>
  </div>

  <div class="main-area">

    <div class="suspect-sidebar" id="suspect-sidebar">
      <div class="sidebar-label">SUSPECTS</div>
    </div>

    <div class="viewer-area">

      <div class="vhs-screen">
        <div class="tracking-line"></div>
        <div class="vhs-timestamp" id="vhs-time">00:00:00:00</div>
        <div class="vhs-channel" id="vhs-channel">CH 01</div>

        <div class="tape-content">
          <div class="tape-playing-label" id="playing-label">▶ NOW PLAYING — TAPE 001</div>
          <div class="tape-suspect-name" id="tape-suspect-name">— — —</div>
          <div class="tape-question" id="tape-question"></div>
          <div class="tape-answer loading" id="tape-answer">[ AWAITING AI RESPONSE... ]</div>
        </div>
      </div>

      <div class="controls-bar">
        <button class="ctrl-btn" onclick="prevQuestion()">◀ PREV</button>
        <button class="ctrl-btn active-btn" id="play-pause-btn" onclick="togglePlay()">⏸ PAUSE</button>
        <button class="ctrl-btn" onclick="nextQuestion()">NEXT ▶</button>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:20%"></div>
        </div>
        <span class="time-label" id="q-counter">Q 1 / 5</span>
        <button class="ctrl-btn" onclick="ejectTape()">⏏ EJECT</button>
      </div>

      <div class="question-nav" id="question-nav">
        <div class="q-pill active" data-q="0" onclick="jumpToQuestion(0)">Q1</div>
        <div class="q-pill" data-q="1" onclick="jumpToQuestion(1)">Q2</div>
        <div class="q-pill" data-q="2" onclick="jumpToQuestion(2)">Q3</div>
        <div class="q-pill" data-q="3" onclick="jumpToQuestion(3)">Q4</div>
        <div class="q-pill" data-q="4" onclick="jumpToQuestion(4)">Q5</div>
      </div>

      <div class="notepad-area">
        <div class="notepad-header">DETECTIVE NOTES</div>
        <textarea
          class="notepad-input"
          id="notepad"
          rows="4"
          placeholder="Write your notes here... cross-reference answers between suspects to find contradictions."
        ></textarea>
      </div>

    </div>
  </div>

  <div class="bottom-bar">
    <div class="progress-label">
      TAPES REVIEWED: <span id="reviewed-count">0</span> / 5 &nbsp;|&nbsp;
      READY TO ACCUSE: <span id="accuse-ready">NO</span>
    </div>
    <button class="accuse-btn" id="accuse-btn" disabled onclick="makeAccusation()">
      ⚑ MAKE ACCUSATION
    </button>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
